services:

  #  Spring App (DEV MODE)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev      # lightweight runtime, no Maven inside
    container_name: wallet_app_dev
    ports:
      - "${APP_PORT:-8000}:8080"
    volumes:
      - ./target:/app/target                                          # jar
      - ./src/main/resources/templates:/app/templates                # ← ADD THIS
      - ./src/main/resources/messages:/app/messages                         # ← messages files too

    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_THYMELEAF_CACHE: ${THYMELEAF_CACHE}
      SPRING_THYMELEAF_PREFIX: ${THYMELEAF_PREFIX}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: true
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wallet_network
    restart: unless-stopped

  #  PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: wallet_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wallet_network
    restart: unless-stopped

  #  PgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wallet_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_EMAIL:-admin@wallet.com}
      PGADMIN_DEFAULT_PASSWORD: ${PG_PASSWORD:-12345}
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - wallet_network
    restart: unless-stopped

  #  RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wallet_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - wallet_network
    restart: unless-stopped

#  Volumes
volumes:
  postgres_data:
  rabbitmq_data:
  pgadmin_data:

#  Network
networks:
  wallet_network:
    driver: bridge