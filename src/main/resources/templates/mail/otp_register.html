<p style="margin:0 0 24px;color:#374151;font-size:16px;line-height:1.6;"
   th:text="#{email.verification.greeting(${username})}">
</p>

<p style="margin:0 0 32px;color:#374151;font-size:16px;line-height:1.6;"
   th:text="#{email.verification.description}">
</p>

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;">
    <tr>
        <td align="center"
            style="background:#f0f7ff;border:2px dashed #0f4c81;border-radius:12px;padding:32px;">

            <div style="color:#6b7280;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;"
                 th:text="#{email.verification.otp.label}">
            </div>

            <div style="color:#1a2e4a;font-size:48px;font-weight:800;letter-spacing:16px;line-height:1;"
                 th:text="${otp}">
            </div>

            <div style="margin-top:16px;color:#9ca3af;font-size:13px;"
                 th:text="#{email.verification.expiry}">
            </div>

        </td>
    </tr>
</table>
